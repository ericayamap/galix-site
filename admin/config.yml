backend:
  name: github
  repo: ericayamap/galix-site
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - file: "index.html"
        label: "Home Page"
        name: "home"
        fields:
          - {label: "Content", name: "body", widget: "text"}
